name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nepapi
          POSTGRES_PASSWORD: nepapi
          POSTGRES_DB: nepapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nepapi"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (unit + integration)
        env:
          NEPAPI_TEST_DATABASE_URL: postgres://nepapi:nepapi@localhost:5432/nepapi?sslmode=disable
        run: go test ./... -v -coverprofile=coverage.out
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
