services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nepapi
      POSTGRES_PASSWORD: nepapi
      POSTGRES_DB: nepapi
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nepapi"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
